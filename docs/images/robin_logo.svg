<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="robingrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2E5C8A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="fpgagrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FPGA-die motif on the left -->
  <g transform="translate(20, 18)">
    <rect x="0"  y="0"  width="84" height="84" rx="6" ry="6"
          fill="#1E3A5F" stroke="#2E5C8A" stroke-width="1.5"/>
    <!-- AIE band -->
    <rect x="6"  y="6"  width="72" height="12" rx="2" fill="#059669" opacity="0.85"/>
    <!-- CLB grid -->
    <g fill="#2E5C8A" opacity="0.75">
      <rect x="6"  y="22" width="9" height="9"/>
      <rect x="17" y="22" width="9" height="9"/>
      <rect x="28" y="22" width="9" height="9"/>
      <rect x="39" y="22" width="9" height="9"/>
      <rect x="50" y="22" width="9" height="9"/>
      <rect x="61" y="22" width="9" height="9"/>
      <rect x="6"  y="33" width="9" height="9"/>
      <rect x="17" y="33" width="9" height="9"/>
      <rect x="28" y="33" width="9" height="9"/>
      <rect x="39" y="33" width="9" height="9"/>
      <rect x="50" y="33" width="9" height="9"/>
      <rect x="61" y="33" width="9" height="9"/>
      <rect x="6"  y="44" width="9" height="9"/>
      <rect x="17" y="44" width="9" height="9"/>
      <rect x="28" y="44" width="9" height="9"/>
      <rect x="39" y="44" width="9" height="9"/>
      <rect x="50" y="44" width="9" height="9"/>
      <rect x="61" y="44" width="9" height="9"/>
      <rect x="6"  y="55" width="9" height="9"/>
      <rect x="17" y="55" width="9" height="9"/>
      <rect x="28" y="55" width="9" height="9"/>
      <rect x="39" y="55" width="9" height="9"/>
      <rect x="50" y="55" width="9" height="9"/>
      <rect x="61" y="55" width="9" height="9"/>
      <rect x="6"  y="66" width="9" height="9"/>
      <rect x="17" y="66" width="9" height="9"/>
      <rect x="28" y="66" width="9" height="9"/>
      <rect x="39" y="66" width="9" height="9"/>
      <rect x="50" y="66" width="9" height="9"/>
      <rect x="61" y="66" width="9" height="9"/>
    </g>
    <!-- BRAM/DSP columns -->
    <rect x="72" y="22" width="6" height="53" fill="#F59E0B" opacity="0.8"/>
    <!-- NoC red dashed -->
    <line x1="6" y1="48.5" x2="78" y2="48.5" stroke="#DC2626" stroke-width="1"
          stroke-dasharray="3,1.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(125, 56)" filter="url(#softshadow)">
    <text x="0" y="0"  font-family="Helvetica, Arial, sans-serif"
          font-size="42" font-weight="700"
          fill="url(#robingrad)">ROBIN</text>
    <text x="148" y="0" font-family="Helvetica, Arial, sans-serif"
          font-size="42" font-weight="300"
          fill="#525252">-</text>
    <text x="166" y="0" font-family="Helvetica, Arial, sans-serif"
          font-size="42" font-weight="700"
          fill="url(#fpgagrad)">FPGA</text>
  </g>

  <!-- Tagline -->
  <text x="125" y="84" font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#525252"
        letter-spacing="0.5">
    distributionally-robust RL  ·  conformal sign-off  ·  timing closure
  </text>
</svg>
