name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Format check with black
        run: black --check src/ tests/ scripts/

      - name: Type check with mypy
        run: mypy src/robin_fpga
        continue-on-error: true   # mypy is informational for now

      - name: Test with pytest
        run: pytest tests/ -v --cov=robin_fpga --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  simulator-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          pip install -e ".[dev]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run simulator
        run: python scripts/run_simulator.py --output /tmp/results/ --seed 42
      - name: Verify all 13 CSVs were created
        run: |
          count=$(ls /tmp/results/*.csv | wc -l)
          if [ "$count" -ne 13 ]; then
            echo "Expected 13 CSV files, got $count"
            exit 1
          fi
