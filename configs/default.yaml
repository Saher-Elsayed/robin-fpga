# =====================================================================
# ROBIN-FPGA: default training configuration
# Override any field via CLI: --override <key.path>=<value>
# =====================================================================

experiment:
  name: robin_default
  seed: 42
  output_dir: ./runs

# ---- model / agent ----
agent:
  encoder:
    node_feat_dim: 16
    edge_feat_dim: 4
    tab_feat_dim: 32
    gat_layers: 2
    gat_heads: 4
    gat_hidden_1: 32
    gat_hidden_2: 64
    mlp_hidden: [128, 128, 128]
    mlp_activation: gelu
    latent_dim: 128
    dropout: 0.0
  policy:
    action_space_size: 192
    hidden_dim: 128
  value:
    hidden_dim: 128
  slack_head:
    hidden_dim: 64
  conformal:
    alpha: 0.05
    calibration_size: 50

# ---- training ----
training:
  episodes: 1200
  batch_size: 64
  rollouts_per_update: 4
  update_epochs: 4
  learning_rate: 3.0e-4
  ppo_clip: 0.2
  cvar_beta: 0.20
  value_coef: 0.5
  entropy_coef: 0.01
  slack_coef: 0.5
  grad_clip: 1.0
  validation_interval: 50
  checkpoint_interval: 100
  calibration_interval: 100
  early_stop_patience: 200

# ---- environment ----
environment:
  tool: vivado
  tool_version: "2024.2"
  device: xcve2302-sfva784-2MP-e-S
  K_seeds: 10
  corners:
    - { process: SS, voltage: nominal, temperature: 125 }
    - { process: TT, voltage: nominal, temperature: 25 }
    - { process: FF, voltage: nominal, temperature: -40 }
  wall_clock_budget_hours: 2
  parallel: 8

# ---- reward ----
reward:
  w_wns: 1.0
  w_tns: 0.3
  kappa_util: 5.0
  kappa_fail: 10.0
  clip_wns: true
  clk_period_ns: 5.0
  util_budgets:
    LUT:  70.0
    FF:   70.0
    BRAM: 80.0
    DSP:  80.0
    URAM: 80.0

# ---- logging ----
logging:
  level: INFO
  tensorboard: true
  wandb: false
  log_interval: 10
